<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realtor.ca Listing Filter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>🏡 Realtor.ca Listing Filter</h1>
    <p class="tagline">Paste a realtor.ca map/list search link, then filter by parking and title (ownership) type.</p>
  </header>

  <main class="layout">
    <section class="load-section">
      <form id="search-form" class="load-form">
        <input
          id="search-url"
          type="text"
          placeholder="https://www.realtor.ca/map#ZoomLevel=11&Center=...&view=list&..."
          autocomplete="off"
        />
        <button id="load-btn" type="submit">Load listings</button>
      </form>
      <p id="load-status" class="load-status"></p>
      <p id="error-box" class="error-box" hidden></p>
    </section>

    <div class="content">
      <aside id="filters-panel" class="filters-panel" hidden>
        <h2>Filters</h2>

        <div class="filter-group">
          <h3>Parking</h3>
          <select id="parking-filter">
            <option value="any">Any</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>

        <div class="filter-group">
          <h3>Title / ownership type</h3>
          <div id="ownership-checks" class="checks-list"></div>
        </div>

        <div class="filter-group">
          <h3>Keyword search</h3>
          <input type="text" id="keyword-filter" placeholder="e.g. townhouse, street name…" />
        </div>

        <button id="reset-filters" type="button" class="reset-btn">Reset filters</button>

        <p class="hint">
          <strong>?</strong> badges mean parking isn't specified for that listing —
          check the full listing to confirm.
        </p>
      </aside>

      <section class="results-area">
        <div class="results-header">
          <span id="results-summary"></span>
          <label class="sort-label">
            Sort by
            <select id="sort-select">
              <option value="newest">Newest</option>
              <option value="price-asc">Price: low to high</option>
              <option value="price-desc">Price: high to low</option>
            </select>
          </label>
        </div>
        <div id="results" class="results-grid"></div>
      </section>
    </div>
  </main>

  <script src="filters.js"></script>
  <script src="app.js"></script>
</body>
</html>
